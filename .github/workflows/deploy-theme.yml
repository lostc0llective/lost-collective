name: Deploy Theme

# Deployment workflow with environment-based gates:
# - Staging deploys automatically on pushes to staging branch
# - Production deploys automatically on pushes to main branch
# - Production deployments require manual approval via GitHub environment
# - See "environments" section in repository settings to configure required reviewers

on:
  push:
    branches:
      - main
      - staging
    paths:
      - 'assets/**'
      - 'config/**'
      - 'layout/**'
      - 'locales/**'
      - 'sections/**'
      - 'snippets/**'
      - 'templates/**'

jobs:
  staging-deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest @shopify/theme@latest

      - name: Deploy to staging
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_STORE_TOKEN }}
        run: |
          shopify theme push \
            --store lost-collective.myshopify.com \
            --theme 141183910054 \
            --allow-live \
            --no-color

  production-approval:
    name: Request Production Approval
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      approved: ${{ job.status == 'success' }}

    environment:
      name: production
      url: https://lost-collective.myshopify.com

    steps:
      - name: Awaiting Approval
        run: echo "Waiting for manual approval to deploy to production..."

  production-deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: production-approval
    if: github.ref == 'refs/heads/main' && success()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest @shopify/theme@latest

      - name: Deploy to production
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_STORE_TOKEN }}
        run: |
          shopify theme push \
            --store lost-collective.myshopify.com \
            --theme 143356625062 \
            --allow-live \
            --no-color
