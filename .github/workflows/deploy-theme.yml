name: Deploy Theme

on:
  push:
    branches:
      - main
      - staging
    paths:
      - 'assets/**'
      - 'config/**'
      - 'layout/**'
      - 'locales/**'
      - 'sections/**'
      - 'snippets/**'
      - 'templates/**'

jobs:
  deploy:
    name: Push to Shopify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest @shopify/theme@latest

      - name: Deploy to production (main branch)
        if: github.ref == 'refs/heads/main'
        env:
          SHOPIFY_FLAG_STORE_PASSWORD: ${{ secrets.SHOPIFY_STORE_TOKEN }}
        run: |
          shopify theme push \
            --store lost-collective.myshopify.com \
            --theme 143356625062 \
            --allow-live

      - name: Deploy to staging (staging branch)
        if: github.ref == 'refs/heads/staging'
        env:
          SHOPIFY_FLAG_STORE_PASSWORD: ${{ secrets.SHOPIFY_STORE_TOKEN }}
        run: |
          shopify theme push \
            --store lost-collective.myshopify.com \
            --theme 141183910054 \
            --allow-live
